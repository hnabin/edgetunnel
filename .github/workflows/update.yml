name: Upstream Sync

# 必须赋予 GitHub Actions 写入仓库的权限
permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 时间 0 点自动执行
  workflow_dispatch: # 开启手动触发按钮，方便随时测试

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v3

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: cmliu/edgetunnel # 已经帮你填好了原作者仓库
          upstream_sync_branch: main           # cmliu 的主分支是 main
          target_sync_branch: main             # 你的主分支也是 main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false

      - name: Sync check
        if: failure()
        run: echo "同步失败，请检查配置或是否存在复杂的代码冲突。"
